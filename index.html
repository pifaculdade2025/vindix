<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #666;
      --success-bg: #0d2e1a;
      --success-text: #4ade80;
      --error-bg: #2e0d0d;
      --error-text: #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ─── LOGIN ─── */
    #tela-login {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .login-title {
      font-size: 32px;
      font-weight: 600;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .login-sub {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 36px;
    }

    .field { margin-bottom: 16px; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus { border-color: var(--accent); }
    .field input::placeholder { color: #444; }

    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 15px;
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.99); }
    .btn-login:disabled { opacity: 0.4; cursor: not-allowed; }

    .mensagem {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .sucesso { background: var(--success-bg); color: var(--success-text); border: 1px solid #1a4d2e; }
    .erro    { background: var(--error-bg);   color: var(--error-text);   border: 1px solid #4d1a1a; }

    /* ─── SISTEMA ─── */
    #tela-sistema {
      display: none;
      width: 100%;
      min-height: 100vh;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .topbar-logo {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .topbar-user {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
      color: var(--muted);
    }

    .topbar-user span { color: var(--text); font-weight: 500; }

    .btn-sair {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-sair:hover { border-color: var(--error-text); color: var(--error-text); }

    .conteudo {
      flex: 1;
      padding: 40px 32px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    .page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .page-title { font-size: 24px; font-weight: 600; }
    .page-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .btn-recarregar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 20px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-recarregar:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── TABELA ─── */
    .tabela-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .tabela-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .tabela-titulo {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .tabela-count {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    table { width: 100%; border-collapse: collapse; }

    th {
      padding: 12px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 14px 20px;
      font-size: 14px;
      border-bottom: 1px solid #1f1f1f;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); cursor: pointer; }

    .td-id {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--muted);
    }

    .td-data {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      white-space: nowrap;
    }

    .badge-especialidade {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      background: #1a1f2e;
      color: #7eb8f7;
      border: 1px solid #2a3a5e;
    }

    /* ─── LOADING / EMPTY ─── */
    .estado {
      padding: 60px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    .estado-icon {
      font-size: 32px;
      margin-bottom: 12px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- ── TELA DE LOGIN ── -->
  <div id="tela-login">
    <div class="logo">◆ Sistema</div>
    <h1 class="login-title">Bem-vindo<br>de volta.</h1>
    <p class="login-sub">Faça login para acessar o sistema.</p>

    <div class="field">
      <label>Usuário</label>
      <input type="text" id="usuario" placeholder="seu.usuario" />
    </div>

    <div class="field">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" />
    </div>

    <button class="btn-login" id="btnLogin" onclick="fazerLogin()">Entrar</button>
    <div class="mensagem" id="mensagem"></div>
  </div>

  <!-- ── TELA DO SISTEMA ── -->
  <div id="tela-sistema">
    <div class="topbar">
      <div class="topbar-logo">◆ Sistema</div>
      <div class="topbar-user">
        Olá, <span id="nomeUsuario"></span>
        <button class="btn-sair" onclick="sair()">Sair</button>
      </div>
    </div>

    <div class="conteudo">
      <div class="page-header">
        <div>
          <div class="page-title">Consultas</div>
          <div class="page-sub">Listagem de atendimentos</div>
        </div>
        <button class="btn-recarregar" onclick="carregarConsultas()">
          🔄 Recarregar
        </button>
      </div>

      <div class="tabela-wrap">
        <div class="tabela-toolbar">
          <div class="tabela-titulo">CONSULTAS</div>
          <div class="tabela-count" id="totalRegistros">—</div>
        </div>
        <div id="tabela-conteudo">
          <div class="estado">
            <div class="estado-icon">📋</div>
            Faça login para carregar as consultas.
          </div>
        </div>
      </div>

    </div>
  </div>

  <script>
    let codigoUsuario     = 0;
    let nomeUsuarioLogado = '';

    async function fazerLogin() {
      const usuario = document.getElementById('usuario').value.trim();
      const senha   = document.getElementById('senha').value.trim();
      const btn     = document.getElementById('btnLogin');

      if (!usuario || !senha) {
        mostrarMensagem('Preencha todos os campos.', 'erro');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Verificando...';

      try {
        const url = `http://localhost:8080/login?usuario=${encodeURIComponent(usuario)}&senha=${encodeURIComponent(senha)}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error('Erro no servidor');
        const data = await response.json();

        if (data.sucesso) {
          codigoUsuario     = data.codigo;
          nomeUsuarioLogado = data.nome;

          document.getElementById('tela-login').style.display   = 'none';
          document.getElementById('tela-sistema').style.display = 'flex';
          document.getElementById('nomeUsuario').textContent     = data.nome;

          carregarConsultas();
        } else {
          mostrarMensagem(`❌ ${data.mensagem}`, 'erro');
        }
      } catch (err) {
        mostrarMensagem('Não foi possível conectar ao servidor.', 'erro');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    }

    async function carregarConsultas() {
      const conteudo = document.getElementById('tabela-conteudo');
      const total    = document.getElementById('totalRegistros');

      conteudo.innerHTML = `
        <div class="estado">
          <div class="spinner"></div>
          Carregando consultas...
        </div>`;
      total.textContent = '—';

      try {
        const response = await fetch(`http://localhost:8080/consultas?usuario=${codigoUsuario}`);
        if (!response.ok) throw new Error('Erro no servidor');
        const consultas = await response.json();

        if (consultas.length === 0) {
          conteudo.innerHTML = `
            <div class="estado">
              <div class="estado-icon">📭</div>
              Nenhuma consulta encontrada.
            </div>`;
          total.textContent = '0 registros';
          return;
        }

        let rows = '';
        consultas.forEach(c => {
          rows += `
            <tr onclick="abrirRelatorio(${c.id})">
              <td class="td-id">#${c.id}</td>
              <td>${c.paciente}</td>
              <td>${c.terapeuta}</td>
              <td class="td-data">${c.dataHora}</td>
              <td><span class="badge-especialidade">${c.especialidade}</span></td>
            </tr>`;
        });

        conteudo.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Paciente</th>
                <th>Terapeuta</th>
                <th>Data / Hora</th>
                <th>Especialidade</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>`;

        total.textContent = `${consultas.length} registro${consultas.length !== 1 ? 's' : ''}`;

      } catch (err) {
        conteudo.innerHTML = `
          <div class="estado">
            <div class="estado-icon">⚠️</div>
            Erro ao carregar consultas. Verifique a conexão.
          </div>`;
        total.textContent = '—';
      }
    }

    function abrirRelatorio(id) {
      window.open(`http://localhost:8080/imprimir?codigo=${id}&usuario=${codigoUsuario}`, '_blank');
    }

    function sair() {
      codigoUsuario     = 0;
      nomeUsuarioLogado = '';
      document.getElementById('tela-sistema').style.display = 'none';
      document.getElementById('tela-login').style.display   = 'block';
      document.getElementById('usuario').value = '';
      document.getElementById('senha').value   = '';
      document.getElementById('mensagem').style.display = 'none';
      document.getElementById('tabela-conteudo').innerHTML = `
        <div class="estado">
          <div class="estado-icon">📋</div>
          Faça login para carregar as consultas.
        </div>`;
      document.getElementById('totalRegistros').textContent = '—';
    }

    function mostrarMensagem(texto, tipo) {
      const msg = document.getElementById('mensagem');
      msg.textContent = texto;
      msg.className   = `mensagem ${tipo}`;
      msg.style.display = 'block';
    }

    document.addEventListener('keypress', e => {
      if (e.key === 'Enter') fazerLogin();
    });
  </script>

</body>
</html>
